<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabliczka Mnożenia</title>
</head>
<body>
  <div id="controls">
    <label for="size">Rozmiar tabeli</label>
    <input type="number" id="size">
    <label for="modulo">Modulo</label>
    <input type="number" id="modulo">
    <label for="color1">Kolor modulo</label>
    <input type="color" id="color1">
    <label for="color2">Kolor parzystych</label>
    <input type="color" id="color2">
    <label for="color3">Kolor nieparzystych</label>
    <input type="color" id="color3">
    <button id="button">Generuj Tabliczkę</button>
  </div>
  <div id="table-container"></div>
</body>
</html>
